<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizzería - Realizar Pedido</title>
    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <!-- Navbar responsivo -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">Pizzería</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="/">Hacer Pedido</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/pedidos/ver">Ver Pedidos</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h1 class="mb-4">Realizar Pedido de Pizza</h1>
        <form id="formPedido" action="/pedidos" method="post" class="shadow p-4 rounded bg-light">
            <div class="mb-3">
                <label for="nombre" class="form-label">Nombre cliente</label>
                <input type="text" name="nombre" id="nombre" class="form-control" placeholder="Ingrese su nombre" required>
            </div>

            <div class="mb-3">
                <label class="form-label d-block">Tamaño de la pizza</label>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="tamañopizza" id="pizzaChica" value="Chica" required>
                    <label class="form-check-label" for="pizzaChica">Chica ($3.990)</label>
                </div>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="tamañopizza" id="pizzaMediana" value="Mediana" required>
                    <label class="form-check-label" for="pizzaMediana">Mediana ($5.990)</label>
                </div>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="tamañopizza" id="pizzaGrande" value="Grande" required>
                    <label class="form-check-label" for="pizzaGrande">Grande ($8.490)</label>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label d-block">Ingredientes (3 base, extras tienen costo adicional)</label>
                <div class="row row-cols-2 row-cols-md-4 g-2">
                    <div class="col">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="ingrediente_jamon" id="ingrediente_jamon" value="Jamón">
                            <label class="form-check-label" for="ingrediente_jamon">Jamón</label>
                        </div>
                    </div>
                    <div class="col">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="ingrediente_quesoext" id="ingrediente_quesoext" value="Queso extra">
                            <label class="form-check-label" for="ingrediente_quesoext">Queso extra</label>
                        </div>
                    </div>
                    <div class="col">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="ingrediente_champ" id="ingrediente_champ" value="Champiñones">
                            <label class="form-check-label" for="ingrediente_champ">Champiñones</label>
                        </div>
                    </div>
                    <div class="col">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="ingrediente_aceituna" id="ingrediente_aceituna" value="Aceituna">
                            <label class="form-check-label" for="ingrediente_aceituna">Aceituna</label>
                        </div>
                    </div>
                    <div class="col">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="ingrediente_cebolla" id="ingrediente_cebolla" value="Cebolla">
                            <label class="form-check-label" for="ingrediente_cebolla">Cebolla</label>
                        </div>
                    </div>
                    <div class="col">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="ingrediente_pimenton" id="ingrediente_pimenton" value="Pimentón">
                            <label class="form-check-label" for="ingrediente_pimenton">Pimentón</label>
                        </div>
                    </div>
                    <div class="col">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="ingrediente_tocino" id="ingrediente_tocino" value="Tocino">
                            <label class="form-check-label" for="ingrediente_tocino">Tocino</label>
                        </div>
                    </div>
                </div>
            </div>

            <div class="mb-3">
                <label for="cantidadpizzas" class="form-label">Cantidad de pizzas</label>
                <input type="number" name="cantidadpizzas" id="cantidadpizzas" class="form-control" min="1" max="10" value="1" required>
            </div>

            <div class="alert alert-primary d-flex justify-content-between align-items-center mb-3">
                <strong>Precio estimado:</strong>
                <span id="precioPreview" class="fs-4 fw-bold">$0</span>
            </div>

            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-primary btn-lg">Enviar pedido</button>
            </div>
        </form>
        
        <div class="mt-3 mb-5 text-center">
            <a href="/pedidos/ver" class="btn btn-outline-secondary">Ver pedidos realizados</a>
        </div>
    </div>

    <!-- Modal de Verificación -->
    <div class="modal fade" id="modalVerificacion" tabindex="-1" aria-labelledby="modalVerificacionLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title" id="modalVerificacionLabel">Confirmar su Pedido</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div id="modalBody" class="modal-body">
                    <!-- El resumen se inyectará aquí -->
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" id="confirmarEnvio" class="btn btn-primary">Confirmar y Enviar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const form = document.getElementById('formPedido');
        const precioPreview = document.getElementById('precioPreview');
        const modalBody = document.getElementById('modalBody');
        const btnConfirmar = document.getElementById('confirmarEnvio');
        const modalElement = new bootstrap.Modal(document.getElementById('modalVerificacion'));

        function calcularPrecio() {
            const tamaño = form.querySelector('input[name="tamañopizza"]:checked');
            const ingredientesChecked = form.querySelectorAll('input[type="checkbox"]:checked');
            const cantidad = parseInt(document.getElementById('cantidadpizzas').value) || 0;

            if (!tamaño) {
                precioPreview.textContent = "$0";
                return 0;
            }

            let precioBase = 0;
            let valorExtra = 0;

            if (tamaño.value === "Chica") {
                precioBase = 3990;
                valorExtra = 500;
            } else if (tamaño.value === "Mediana") {
                precioBase = 5990;
                valorExtra = 800;
            } else if (tamaño.value === "Grande") {
                precioBase = 8490;
                valorExtra = 1200;
            }

            const extras = Math.max(0, ingredientesChecked.length - 3);
            const totalUnitario = precioBase + (extras * valorExtra);
            const totalFinal = totalUnitario * cantidad;

            precioPreview.textContent = "$" + totalFinal.toLocaleString('es-CL');
            return totalFinal;
        }

        form.addEventListener('change', calcularPrecio);
        form.querySelector('#cantidadpizzas').addEventListener('input', calcularPrecio);

        form.addEventListener('submit', function(e) {
            e.preventDefault();

            const nombre = document.getElementById('nombre').value;
            const tamaño = form.querySelector('input[name="tamañopizza"]:checked').value;
            const ingredientes = Array.from(form.querySelectorAll('input[type="checkbox"]:checked')).map(i => i.value);
            const cantidad = document.getElementById('cantidadpizzas').value;
            const total = precioPreview.textContent;

            modalBody.innerHTML = `
                <p><strong>Cliente:</strong> ${nombre}</p>
                <p><strong>Tamaño:</strong> ${tamaño}</p>
                <p><strong>Ingredientes:</strong> ${ingredientes.length > 0 ? ingredientes.join(', ') : 'Solo base'}</p>
                <p><strong>Cantidad:</strong> ${cantidad}</p>
                <hr>
                <h4 class="text-end">Total: ${total}</h4>
            `;

            modalElement.show();
        });

        btnConfirmar.addEventListener('click', function() {
            form.submit();
        });

        // Inicializar precio
        calcularPrecio();
    </script>
</body>

</html>
